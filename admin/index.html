<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BonDeba — Admin Login</title>
  <meta name="robots" content="noindex, nofollow" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            royal:  '#1E3A8A',
            gold:   '#D4AF37',
            forest: '#16A34A',
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .shake { animation: shake 0.4s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-6px); }
      40%,80% { transform: translateX(6px); }
    }
  </style>
</head>
<body class="h-full bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 flex items-center justify-center min-h-screen px-4">

  <!-- Background pattern -->
  <div class="absolute inset-0 opacity-5 pointer-events-none"
       style="background-image: radial-gradient(circle at 1px 1px, #D4AF37 1px, transparent 0); background-size: 32px 32px;"></div>

  <div class="relative w-full max-w-md">

    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">

      <!-- Top bar -->
      <div class="bg-royal px-8 py-6 text-center">
        <a href="/" class="inline-block text-2xl font-extrabold text-white tracking-tight">
          Bon<span class="text-gold">Deba</span>
        </a>
        <p class="mt-1 text-blue-200 text-sm font-medium">Committee Access Portal</p>
      </div>

      <!-- Form -->
      <div class="px-8 py-8">
        <div class="text-center mb-6">
          <div class="w-14 h-14 mx-auto bg-blue-50 rounded-2xl flex items-center justify-center text-2xl mb-3">🛡️</div>
          <h1 class="text-xl font-bold text-gray-900">Admin Sign In</h1>
          <p class="text-sm text-gray-500 mt-1">Restricted to committee members only</p>
        </div>

        <!-- Error banner -->
        <div id="error-banner" class="hidden mb-4 flex items-center gap-2 bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-xl">
          <span>⚠️</span>
          <span id="error-msg">Invalid credentials. Please try again.</span>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">

          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1.5 uppercase tracking-wide">Username</label>
            <input id="username" type="text" autocomplete="username" placeholder="committee username"
              class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-royal/30 focus:border-royal text-sm transition-all" />
          </div>

          <div>
            <label class="block text-xs font-semibold text-gray-600 mb-1.5 uppercase tracking-wide">Password</label>
            <div class="relative">
              <input id="password" type="password" autocomplete="current-password" placeholder="••••••••"
                class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-royal/30 focus:border-royal text-sm transition-all pr-11" />
              <button type="button" onclick="togglePw()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 text-lg" id="pw-eye">👁️</button>
            </div>
          </div>

          <div class="flex items-center gap-2">
            <input id="remember" type="checkbox" class="w-4 h-4 rounded accent-royal" />
            <label for="remember" class="text-sm text-gray-600">Remember me on this device</label>
          </div>

          <button type="submit" id="login-btn"
            class="w-full bg-royal text-white font-bold py-3 rounded-xl hover:bg-blue-900 transition-all shadow-lg shadow-blue-100 flex items-center justify-center gap-2 mt-2">
            <span id="btn-text">Sign In</span>
            <span id="btn-spinner" class="hidden w-4 h-4 border-2 border-white/40 border-t-white rounded-full animate-spin"></span>
          </button>
        </form>

        <p class="mt-6 text-center text-xs text-gray-400">
          Not a committee member?
          <a href="/" class="text-royal font-semibold hover:underline">Back to BonDeba</a>
        </p>
      </div>
    </div>

    <!-- Footer note -->
    <p class="text-center text-xs text-blue-300/60 mt-4">
      All access attempts are logged · BonDeba Admin v1.0
    </p>
  </div>

  <script>
    // ── COMMITTEE MEMBERS ─────────────────────────────────────────────────
    // Format: username → { passwordHash (SHA-256), role, displayName }
    // To add members: hash their password at https://emn178.github.io/online-tools/sha256.html
    // Default credentials → admin / BonDeba2026!
    const MEMBERS = {
      admin: {
        hash: 'cab0352ad33387f1402010149a2e85717ff7306e06926734d8073b5200b2d40f',
        role: 'superadmin',
        displayName: 'Super Admin',
      },
      comite1: {
        hash: '6c6ffa149c9a354f0d10eec9b9689c04cd69906de5c3be13e8e380f60ca5df8b',
        role: 'moderator',
        displayName: 'Comité Membre 1',
      },
    };

    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;

      setLoading(true);
      hideError();

      // Simulate network delay for realism
      await new Promise(r => setTimeout(r, 600));

      const hash = await sha256(password);
      const member = MEMBERS[username];

      if (member && member.hash === hash) {
        // Store session
        const session = {
          username,
          displayName: member.displayName,
          role: member.role,
          loginAt: Date.now(),
          expires: Date.now() + (remember ? 7 * 86400000 : 8 * 3600000), // 7d or 8h
        };
        const storage = remember ? localStorage : sessionStorage;
        storage.setItem('bt_admin_session', JSON.stringify(session));
        // Redirect to dashboard
        window.location.href = '/admin/dashboard.html';

      } else {
        setLoading(false);
        showError('Invalid username or password. Please try again.');
        document.getElementById('login-form').classList.add('shake');
        setTimeout(() => document.getElementById('login-form').classList.remove('shake'), 400);
      }
    }

    function setLoading(on) {
      document.getElementById('btn-text').textContent = on ? 'Signing in…' : 'Sign In';
      document.getElementById('btn-spinner').classList.toggle('hidden', !on);
      document.getElementById('login-btn').disabled = on;
    }

    function showError(msg) {
      document.getElementById('error-msg').textContent = msg;
      document.getElementById('error-banner').classList.remove('hidden');
    }

    function hideError() {
      document.getElementById('error-banner').classList.add('hidden');
    }

    function togglePw() {
      const input = document.getElementById('password');
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      document.getElementById('pw-eye').textContent = isHidden ? '🙈' : '👁️';
    }

    // Redirect if already logged in
    (function checkSession() {
      try {
        const raw = localStorage.getItem('bt_admin_session') || sessionStorage.getItem('bt_admin_session');
        if (!raw) return;
        const s = JSON.parse(raw);
        if (s && s.expires > Date.now()) window.location.href = '/admin/dashboard.html';
      } catch (e) { /* corrupt storage — ignore */ }
    })();
  </script>
</body>
</html>
