<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2147"/>
      <stop offset="100%" stop-color="#1a3a6b"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9952a"/>
      <stop offset="100%" stop-color="#f0b832"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3ecf8e"/>
      <stop offset="100%" stop-color="#1a6b4a"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5b8def"/>
      <stop offset="100%" stop-color="#1a3a6b"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0b832"/>
      <stop offset="100%" stop-color="#c9952a"/>
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <line x1="170" y1="100" x2="170" y2="412" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="256" y1="100" x2="256" y2="412" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="342" y1="100" x2="342" y2="412" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="100" y1="256" x2="412" y2="256" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Bar chart — three rising bars representing growth / transition -->
  <!-- Bar 1 (short) -->
  <rect x="118" y="310" width="72" height="102" rx="10" fill="url(#bar2)" opacity="0.9"/>
  <!-- Bar 2 (medium) -->
  <rect x="220" y="240" width="72" height="172" rx="10" fill="url(#bar1)" opacity="0.95"/>
  <!-- Bar 3 (tall) -->
  <rect x="322" y="160" width="72" height="252" rx="10" fill="url(#bar3)"/>

  <!-- Upward arrow / trajectory line over bars -->
  <polyline
    points="118,336 220,268 322,188"
    fill="none"
    stroke="url(#arrow)"
    stroke-width="12"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.9"
  />

  <!-- Arrow head at top right -->
  <polygon
    points="322,188 356,170 340,204"
    fill="url(#arrow)"
    opacity="0.9"
  />

  <!-- Subtle glow dot at arrow tip -->
  <circle cx="340" cy="188" r="10" fill="#f0b832" opacity="0.35"/>
</svg>
